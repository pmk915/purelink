services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-purelink}
      POSTGRES_USER: ${POSTGRES_USER:-purelink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-purelink}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-purelink} -d ${POSTGRES_DB:-purelink}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      APP_NAME: ${APP_NAME:-PureLink}
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-purelink-dev-secret-key-change-me}
      AUTH_ALGORITHM: ${AUTH_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-purelink}:${POSTGRES_PASSWORD:-purelink}@db:5432/${POSTGRES_DB:-purelink}
      REDIS_URL: redis://redis:6379/0
      DB_ECHO: ${DB_ECHO:-false}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
      CORS_ALLOW_METHODS: ${CORS_ALLOW_METHODS:-*}
      CORS_ALLOW_HEADERS: ${CORS_ALLOW_HEADERS:-*}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-false}
      UPLOAD_DIR: data/uploads
      PARSED_DIR: data/parsed
      CHUNK_DIR: data/chunks
      VECTOR_STORE_DIR: data/vector_store
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local_hashed_bow}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      EMBEDDING_TIMEOUT_SECONDS: ${EMBEDDING_TIMEOUT_SECONDS:-30}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-}
      OCR_PROVIDER: ${OCR_PROVIDER:-tesseract}
      OCR_TESSERACT_COMMAND: ${OCR_TESSERACT_COMMAND:-tesseract}
      OCR_LANGUAGE: ${OCR_LANGUAGE:-eng}
      OCR_TESSERACT_PSM: ${OCR_TESSERACT_PSM:-6}
      ASR_PROVIDER: ${ASR_PROVIDER:-vosk}
      ASR_FFMPEG_COMMAND: ${ASR_FFMPEG_COMMAND:-ffmpeg}
      ASR_VOSK_MODEL_PATH: ${ASR_VOSK_MODEL_PATH:-/opt/vosk/vosk-model-small-en-us-0.15}
      RERANKER_ENABLED: ${RERANKER_ENABLED:-true}
      RERANKER_PROVIDER: ${RERANKER_PROVIDER:-local_rule_reranker}
      LLM_PROVIDER: ${LLM_PROVIDER:-heuristic}
      LLM_API_BASE: ${LLM_API_BASE:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /app
    command: python -m app.workers.processing_worker_main
    environment:
      APP_NAME: ${APP_NAME:-PureLink}
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-purelink}:${POSTGRES_PASSWORD:-purelink}@db:5432/${POSTGRES_DB:-purelink}
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: data/uploads
      PARSED_DIR: data/parsed
      CHUNK_DIR: data/chunks
      VECTOR_STORE_DIR: data/vector_store
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local_hashed_bow}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      EMBEDDING_TIMEOUT_SECONDS: ${EMBEDDING_TIMEOUT_SECONDS:-30}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-}
      OCR_PROVIDER: ${OCR_PROVIDER:-tesseract}
      OCR_TESSERACT_COMMAND: ${OCR_TESSERACT_COMMAND:-tesseract}
      OCR_LANGUAGE: ${OCR_LANGUAGE:-eng}
      OCR_TESSERACT_PSM: ${OCR_TESSERACT_PSM:-6}
      ASR_PROVIDER: ${ASR_PROVIDER:-vosk}
      ASR_FFMPEG_COMMAND: ${ASR_FFMPEG_COMMAND:-ffmpeg}
      ASR_VOSK_MODEL_PATH: ${ASR_VOSK_MODEL_PATH:-/opt/vosk/vosk-model-small-en-us-0.15}
      RERANKER_ENABLED: ${RERANKER_ENABLED:-true}
      RERANKER_PROVIDER: ${RERANKER_PROVIDER:-local_rule_reranker}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
