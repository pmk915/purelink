x-common-app-environment: &common-app-environment
  APP_NAME: ${APP_NAME:-PureLink}
  APP_ENV: ${APP_ENV:-development}
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_VERSION: ${APP_VERSION:-0.1.0}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-purelink}:${POSTGRES_PASSWORD:-purelink}@db:5432/${POSTGRES_DB:-purelink}
  REDIS_URL: redis://redis:6379/0
  DATA_DIR: ${DATA_DIR:-data}
  UPLOAD_DIR: ${UPLOAD_DIR:-data/uploads}
  PARSED_DIR: ${PARSED_DIR:-data/parsed}
  CHUNKS_DIR: ${CHUNKS_DIR:-${CHUNK_DIR:-data/chunks}}
  CHUNK_DIR: ${CHUNKS_DIR:-${CHUNK_DIR:-data/chunks}}
  VECTOR_STORE_DIR: ${VECTOR_STORE_DIR:-data/vector_store}
  CHUNK_STRATEGY: ${CHUNK_STRATEGY:-fixed}
  BLOCK_CHUNK_TARGET_CHARS: ${BLOCK_CHUNK_TARGET_CHARS:-900}
  BLOCK_CHUNK_MAX_CHARS: ${BLOCK_CHUNK_MAX_CHARS:-1400}
  BLOCK_CHUNK_MIN_CHARS: ${BLOCK_CHUNK_MIN_CHARS:-120}
  BLOCK_CHUNK_TABLE_MAX_CHARS: ${BLOCK_CHUNK_TABLE_MAX_CHARS:-1800}
  BLOCK_CHUNK_OVERLAP_CHARS: ${BLOCK_CHUNK_OVERLAP_CHARS:-120}
  EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-fastembed}
  EMBEDDING_API_BASE_URL: ${EMBEDDING_API_BASE_URL:-${EMBEDDING_API_BASE:-}}
  EMBEDDING_API_BASE: ${EMBEDDING_API_BASE_URL:-${EMBEDDING_API_BASE:-}}
  EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
  EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cpu}
  EMBEDDING_NORMALIZE: ${EMBEDDING_NORMALIZE:-true}
  EMBEDDING_MODEL_CACHE_DIR: ${EMBEDDING_MODEL_CACHE_DIR:-/app/models/embedding}
  EMBEDDING_TIMEOUT_SECONDS: ${EMBEDDING_TIMEOUT_SECONDS:-30}
  EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
  EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-}
  ENABLE_OCR: ${ENABLE_OCR:-false}
  OCR_PROVIDER: ${OCR_PROVIDER:-disabled}
  OCR_TESSERACT_COMMAND: ${OCR_TESSERACT_COMMAND:-tesseract}
  OCR_LANG: ${OCR_LANG:-${OCR_LANGUAGE:-eng}}
  OCR_LANGUAGE: ${OCR_LANG:-${OCR_LANGUAGE:-eng}}
  OCR_TESSERACT_PSM: ${OCR_TESSERACT_PSM:-6}
  ENABLE_MEDIA: ${ENABLE_MEDIA:-false}
  ASR_PROVIDER: ${ASR_PROVIDER:-disabled}
  ASR_FFMPEG_COMMAND: ${ASR_FFMPEG_COMMAND:-ffmpeg}
  ASR_MODEL_PATH: ${ASR_MODEL_PATH:-${ASR_VOSK_MODEL_PATH:-/app/models/vosk}}
  ASR_VOSK_MODEL_PATH: ${ASR_MODEL_PATH:-${ASR_VOSK_MODEL_PATH:-/app/models/vosk}}
  MULTIMODAL_PROVIDER: ${MULTIMODAL_PROVIDER:-disabled}
  CITATION_UNIT_MIN_CHARS: ${CITATION_UNIT_MIN_CHARS:-40}
  CITATION_UNIT_TARGET_CHARS: ${CITATION_UNIT_TARGET_CHARS:-120}
  CITATION_UNIT_MAX_CHARS: ${CITATION_UNIT_MAX_CHARS:-300}
  CITATION_UNIT_MAX_SENTENCES: ${CITATION_UNIT_MAX_SENTENCES:-3}
  PROCESSING_QUEUE_KEY: ${PROCESSING_QUEUE_KEY:-purelink:processing-jobs:queued}
  PROCESSING_INFLIGHT_QUEUE_KEY: ${PROCESSING_INFLIGHT_QUEUE_KEY:-purelink:processing-jobs:inflight}
  PROCESSING_QUEUE_BLOCK_TIMEOUT_SECONDS: ${PROCESSING_QUEUE_BLOCK_TIMEOUT_SECONDS:-5}
  PROCESSING_QUEUE_RECOVERY_INTERVAL_SECONDS: ${PROCESSING_QUEUE_RECOVERY_INTERVAL_SECONDS:-30}
  PROCESSING_JOB_TIMEOUT_SECONDS: ${PROCESSING_JOB_TIMEOUT_SECONDS:-1800}

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-purelink}
      POSTGRES_USER: ${POSTGRES_USER:-purelink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-purelink}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-purelink} -d ${POSTGRES_DB:-purelink}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      <<: *common-app-environment
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-purelink-dev-secret-key-change-me}
      AUTH_ALGORITHM: ${AUTH_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      DB_ECHO: ${DB_ECHO:-false}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8000/api/v1}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
      CORS_ALLOW_METHODS: ${CORS_ALLOW_METHODS:-*}
      CORS_ALLOW_HEADERS: ${CORS_ALLOW_HEADERS:-*}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-false}
      RERANKER_ENABLED: ${RERANKER_ENABLED:-false}
      RERANKER_PROVIDER: ${RERANKER_PROVIDER:-noop}
      RERANKER_MODEL: ${RERANKER_MODEL:-}
      RERANKER_TOP_N: ${RERANKER_TOP_N:-50}
      FINAL_CONTEXT_TOP_K: ${FINAL_CONTEXT_TOP_K:-8}
      RETRIEVAL_MIN_SCORE: ${RETRIEVAL_MIN_SCORE:-0.15}
      KEYWORD_RETRIEVAL_TOP_N: ${KEYWORD_RETRIEVAL_TOP_N:-50}
      KEYWORD_RETRIEVAL_MIN_SCORE: ${KEYWORD_RETRIEVAL_MIN_SCORE:-0.05}
      OVERVIEW_MAX_CHUNKS: ${OVERVIEW_MAX_CHUNKS:-10}
      OVERVIEW_MAX_CHUNKS_PER_DOCUMENT: ${OVERVIEW_MAX_CHUNKS_PER_DOCUMENT:-2}
      CONVERSATION_RECENT_MESSAGES_LIMIT: ${CONVERSATION_RECENT_MESSAGES_LIMIT:-8}
      CONVERSATION_CONTEXT_MAX_CHARS: ${CONVERSATION_CONTEXT_MAX_CHARS:-3000}
      CONVERSATION_MESSAGE_MAX_CHARS: ${CONVERSATION_MESSAGE_MAX_CHARS:-800}
      MAX_CITATIONS: ${MAX_CITATIONS:-6}
      LLM_PROVIDER: ${LLM_PROVIDER:-heuristic}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL:-${LLM_API_BASE:-}}
      LLM_API_BASE: ${LLM_API_BASE_URL:-${LLM_API_BASE:-}}
      LLM_API_KEY: ${LLM_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      LLM_REASONING_EFFORT: ${LLM_REASONING_EFFORT:-}
      LLM_THINKING_ENABLED: ${LLM_THINKING_ENABLED:-false}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-25}
      ALLOWED_UPLOAD_EXTENSIONS: ${ALLOWED_UPLOAD_EXTENSIONS:-.pdf,.docx,.md,.txt}
      ALLOWED_UPLOAD_MIME_TYPES: ${ALLOWED_UPLOAD_MIME_TYPES:-application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/markdown,text/plain}
      MAX_ACTIVE_JOBS_PER_USER: ${MAX_ACTIVE_JOBS_PER_USER:-5}
      MAX_ACTIVE_JOBS_PER_KB: ${MAX_ACTIVE_JOBS_PER_KB:-10}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /app
    command: python -m app.workers.processing_worker_main
    environment:
      <<: *common-app-environment
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-${API_BASE_URL:-http://localhost:8000/api/v1}}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
