services:
  db:
    restart: unless-stopped
    ports: !reset []
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    restart: unless-stopped
    ports: !reset []
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 20

  api:
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}
    volumes:
      - purelink_data:/app/data
      - purelink_logs:/app/logs
      - purelink_models:/app/models
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s

  worker:
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - purelink_data:/app/data
      - purelink_logs:/app/logs
      - purelink_models:/app/models

  frontend:
    restart: unless-stopped
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s

volumes:
  purelink_data:
  purelink_logs:
  purelink_models:
